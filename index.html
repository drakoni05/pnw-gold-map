<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNW Mineral Prospectivity Map</title>
    <link rel="stylesheet" href="lib/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="sidebar">
        <h1>Mineral Prospectivity</h1>
        <p class="subtitle">Pacific Northwest (ID, OR, WA)</p>

        <div class="section" id="mineral-layers">
            <!-- Dynamically populated by app.js -->
        </div>

        <div class="section">
            <h2>Opacity</h2>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.05" value="0.65" />
        </div>

        <div class="section">
            <h2>Basemap</h2>
            <label class="layer-toggle">
                <input type="radio" name="basemap" value="osm" checked /> OpenStreetMap
            </label>
            <label class="layer-toggle">
                <input type="radio" name="basemap" value="topo" /> USGS Topo
            </label>
            <label class="layer-toggle">
                <input type="radio" name="basemap" value="satellite" /> Satellite
            </label>
        </div>

        <div class="section">
            <h2>Legend</h2>
            <div id="legend"></div>
        </div>

        <div class="section">
            <h2>Info</h2>
            <div id="info-panel">
                <p>Click a point for details.</p>
            </div>
        </div>

        <div class="section credits">
            <p>Data: USGS MRDS, USMIN, NGDB, SGMC; BLM MLRS</p>
            <p>Methodology: KDE + IDW + Geology Masking</p>
        </div>
    </div>

    <div id="map"></div>

    <script src="lib/leaflet/dist/leaflet.js"></script>
    <script src="lib/flatgeobuf-geojson.min.js"></script>
    <script src="lib/leaflet-heat/leaflet-heat.js"></script>
    <script src="js/minerals.js"></script>
    <script src="js/layers.js"></script>
    <script src="js/heatmap.js"></script>
    <script src="js/legend.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
